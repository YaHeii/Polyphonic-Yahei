Name: admin-api
Host: 0.0.0.0
Port: ${ADMIN_API_PORT}
Mode: dev
Timeout: 60000

DevServer:
  Enabled: true
  Port: ${ADMIN_API_DEVSERVER_PORT}
  HealthPath: "/ping"
  MetricsPath: "/metrics"
  EnableMetrics: true

Log:
  Mode: console
  Encoding: plain
  Path: runtime/admin-api/log
  
Limit:
  MaxConns: 1000
  MaxQPS: 500

UploadConfig:
  local-root-dir: /home/yahei
  local-base-url: /static

RedisConf:
  db: ${REDIS_DB}
  host: ${REDIS_HOST}
  port: "${REDIS_PORT}"
  password: ${REDIS_PASSWORD}

EmailConf:
  host: ${EMAIL_HOST}
  port: ${EMAIL_PORT}
  username: ${EMAIL_USERNAME}
  password: ${EMAIL_PASSWORD}
  nickname: ${EMAIL_NICKNAME}
  bcc:
    - ${EMAIL_BCC}

ThirdPartyConf:
  blog-web:
    github:
      client_id: ${BLOG_WEB_GITHUB_CLIENT_ID}
      client_secret: ${BLOG_WEB_GITHUB_CLIENT_SECRET}
      redirect_uri: ${BLOG_WEB_GITHUB_REDIRECT_URI}
  admin-web:
    github:
      client_id: ${ADMIN_WEB_GITHUB_CLIENT_ID}
      client_secret: ${ADMIN_WEB_GITHUB_CLIENT_SECRET}
      redirect_uri: ${ADMIN_WEB_GITHUB_REDIRECT_URI}

BlogRpcConf:
  Endpoints:
    - ${BLOG_RPC_ENDPOINT}
  NonBlock: true
  Timeout: 5000
