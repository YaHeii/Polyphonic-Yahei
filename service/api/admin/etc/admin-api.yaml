Name: admin-api
Host: 0.0.0.0
Port: ${ADMIN_API_PORT}
Mode: dev
Timeout: 60000

DevServer:
  Enabled: true
  Port: ${ADMIN_API_DEVSERVER_PORT}
  HealthPath: "/ping"
  MetricsPath: "/metrics"
  EnableMetrics: true

Log:
  Mode: console
  Encoding: plain
  Path: runtime/admin-api/log

UploadConfig:
  local-root-dir: /home/yahei
  local-base-url: /static

RedisConf:
  db: ${REDIS_DB}
  host: ${REDIS_HOST}
  port: "${REDIS_PORT}"
  password: ${REDIS_PASSWORD}

BlogRpcConf:
  Endpoints:
    - ${BLOG_RPC_ENDPOINT}
  NonBlock: true
  Timeout: 5000
