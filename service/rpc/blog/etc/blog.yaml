Name: blog.rpc
ListenOn: 0.0.0.0:${BLOG_RPC_PORT}
Mode: dev
Timeout: 5000
Health: true

Log:
  Mode: console
  Encoding: plain
  Path: runtime/blog-rpc/log

PgsqlConf:
  host: ${POSTGRES_HOST}
  port: "${POSTGRES_PORT}"
  config: ${POSTGRES_CONFIG}
  dbname: ${POSTGRES_DB}
  username: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}

RedisConf:
  db: ${REDIS_DB}
  host: ${REDIS_HOST}
  port: "${REDIS_PORT}"
  password: ${REDIS_PASSWORD}

RabbitMQConf:
  host: ${RABBITMQ_HOST}
  port: "${RABBITMQ_PORT}"
  username: ${RABBITMQ_USER}
  password: ${RABBITMQ_PASSWORD}
