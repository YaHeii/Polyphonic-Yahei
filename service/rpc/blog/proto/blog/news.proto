// 声明 proto 语法版本，固定值
syntax = "proto3";

// proto 包名
package newsrpc;

// 生成 golang 代码后的包名
option go_package = "./newsrpc";

/************** 通用消息 **************/
// 分页请求参数
message PageReq {
  int64 page = 1;      // 页码
  int64 page_size = 2; // 每页大小
}

// 分页响应参数
message PageResp {
  int64 page = 1;      // 页码
  int64 page_size = 2; // 每页大小
  int64 total = 3;     // 总数
}

/************** 基础消息 **************/
enum messageStatus {
  MESSAGE_STATUS_ACTIVE = 0;
  MESSAGE_STATUS_DELETED = 1;
}

enum CommentType {
  ARTICLE = 0;
  TALK = 1;
}

enum CommentStatus {
  COMMENT_STATUS_ACTIVE = 0;
  COMMENT_STATUS_DELETED = 1;
}

// 留言信息
message Message {
  string user_id = 1;// 用户id
  string message_content = 2;// 留言内容
  messageStatus status = 3; // 状态
  bool is_top = 4;// 是否置顶 1是
  bool is_delete = 5;// 是否删除 1是
  int64 created_at = 6;// 发布时间
  int64 updated_at = 7;// 更新时间
}

// 评论信息
message Comment {
  string user_id = 1;// 评论用户id
  int64 topic_id = 2;// 主题id
  int64 parent_id = 3;// 顶层评论id
  int64 reply_id = 4;// 直接回复的评论id
  string reply_user_id = 5;// 被回复用户id
  string comment_content = 6;// 评论内容
  CommentType type = 7;// 评论类型
  CommentStatus status = 8;// 状态
  bool is_delete = 9;// 是否删除 1是
  int64 created_at = 10;// 评论时间
  int64 updated_at = 11;// 更新时间
  int64 like_count = 12;// 点赞数
}

/************** 留言 **************/
message AddMessageReq {
  string user_id = 1;// 用户id
  string message_content = 2;// 留言内容
}

message AddMessageResp {
  Message message = 1;
}

message UpdateMessageReq {
  string user_id = 1;// 用户id
  string message_content = 2;// 留言内容
}

message UpdateMessageResp {
  Message message = 1;
}

message GetMessageReq {
  string user_id = 1;// 用户id
}

message GetMessageResp {
  Message message = 1;
}

message DeleteMessageReq {
  string user_id = 1;// 用户id
  string message_content = 2;// 留言内容
}

message DeleteMessageResp {
  Message message = 1;
}

message FindMessageListReq {
  PageReq paginate = 1;    // 分页参数
  messageStatus status = 3;// 状态
}

message FindMessageListResp {
  PageResp pagination = 1; // 分页信息
  repeated Message list = 2;
}

/************** 消息管理（评论） **************/
message AddCommentReq {
  int64 topic_id = 1;// 主题id
  int64 parent_id = 2;// 顶层评论id，顶层评论传0
  int64 reply_id = 3;// 直接回复的评论id，顶层评论传0
  string reply_user_id = 4;// 被回复用户id
  string comment_content = 5;// 评论内容
  CommentType type = 6;// 评论类型
}

message AddCommentResp {
  Comment comment = 1;
}

message UpdateCommentReq {
  string comment_content = 2;// 评论内容
}

message UpdateCommentResp {
  Comment comment = 1;
}

message GetCommentReq {
  int64 topic_id = 1;// 主题id
  int64 parent_id = 2;// 顶层评论id，顶层评论传0
  int64 reply_id = 3;// 直接回复的评论id，顶层评论传0
  string reply_user_id = 4;// 被回复用户id
}

message GetCommentResp {
  Comment comment = 1;
}

message DeleteCommentReq {
  int64 topic_id = 1;// 主题id
  int64 parent_id = 2;// 顶层评论id，顶层评论传0
  int64 reply_id = 3;// 直接回复的评论id，顶层评论传0
  string reply_user_id = 4;// 被回复用户id
}

message DeleteCommentResp {
  Comment comment = 1;
}

message FindCommentListReq {
  PageReq paginate = 1;    // 分页参数
  string user_id = 2;// 用户ID
  CommentStatus status = 3;// 状态
  CommentType type = 4;// 评论类型
  int64 topic_id = 5;// 主题id
}

message FindCommentListResp {
  PageResp pagination = 1; // 分页信息
  repeated Comment list = 2;
}

/************** 数据分析 **************/
message AnalysisMessageReq {
}

message AnalysisMessageResp {
  int64 message_count = 1;
}

// 消息服务
service NewsRpc {
  // 消息数据分析
  rpc AnalysisMessage(AnalysisMessageReq) returns(AnalysisMessageResp);

  // 创建留言
  rpc AddMessage(AddMessageReq) returns(AddMessageResp);
  // 更新留言
  rpc UpdateMessage(UpdateMessageReq) returns(UpdateMessageResp);
  // 查询留言
  rpc GetMessage(GetMessageReq) returns(GetMessageResp);
  // 删除留言
  rpc DeletesMessage(DeleteMessageReq) returns(DeleteMessageResp);
  // 查询留言列表
  rpc FindMessageList(FindMessageListReq) returns(FindMessageListResp);

  // 创建评论
  rpc AddComment(AddCommentReq) returns(AddCommentResp);
  // 更新评论
  rpc UpdateComment(UpdateCommentReq) returns(UpdateCommentResp);
  // 查询评论
  rpc GetComment(GetCommentReq) returns(GetCommentResp);
  // 删除评论
  rpc DeletesComment(DeleteCommentReq) returns(DeleteCommentResp);
  // 查询评论列表
  rpc FindCommentList(FindCommentListReq) returns(FindCommentListResp);
}
