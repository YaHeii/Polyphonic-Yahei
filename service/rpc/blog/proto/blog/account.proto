syntax = "proto3";

// proto 包名
package accountrpc;

// 生成 golang 代码后的包名
option go_package = "./accountrpc";

/************** 通用消息 **************/
// 分页请求参数
message PageReq {
  int64 page = 1;      // 页码
  int64 page_size = 2; // 每页大小
}

// 分页响应参数
message PageResp {
  int64 page = 1;      // 页码
  int64 page_size = 2; // 每页大小
  int64 total = 3;     // 总数
}

// 定义偏移量分页的响应元数据。
message OffsetPageMeta {
  // 满足查询条件的总记录数。
  // 意图：供前端计算总页数及渲染页码栏。
  int64 total = 1;
  
  // 服务端实际采用的当前页码。
  int32 page_num = 2;
  
  // 服务端实际采用的每页数据量。
  int32 page_size = 3;
}

/************** 基础消息 **************/
// 意图：收敛状态边界，拒绝非法数值。
enum UserStatus {
  ACTIVE = 0;                  // 正常
  FROZEN = 1;                  // 冻结
  DELETED = 2;                 // 已删除
}

enum UserRegisterType {
  OAUTH = 0;
  EMAIL = 1;
}
enum RoleKey {
  ROOT = 0;
  SUPER_ADMIN = 1;
  VISITOR = 2;
}

// 用户信息响应基础结构
message UserInfo {
  string user_id = 1; // 用户id
  string username = 2;// 用户名
  string nickname = 3;// 用户昵称
  string avatar = 4;// 用户头像
  string email = 5;// 用户邮箱
  string phone = 6;// 用户手机号
  string info = 7;// 用户信息
  UserStatus status = 8;
  UserRegisterType register_type = 9;
  string ip_address = 10;// IP 地址
  string ip_source = 11;// IP 归属地
  int64 created_at = 12;
  int64 updated_at = 13;
  RoleKey roles = 14; //用户对应单一角色
}

// 游客信息
message VisitorInfo{
  string ip_address = 5;        // IP地址
  string ip_source = 6;         // IP归属地
  int64 created_at = 7;         // 创建时间
  int64 updated_at = 8;         // 更新时间
}

// 用户第三方授权信息
message UserOauthInfo {
  string platform = 1;// 平台
  string open_id = 2;// 开放id
  string nickname = 3;// 昵称
  string avatar = 4;// 头像
  int64 created_at = 5;// 创建时间
  int64 updated_at = 6;// 更新时间
}

// 用户地区分布信息
message UserArea {
  string ip_address = 10;// IP 地址
  string ip_source = 11;// IP 归属地
}

/************** auth 登录相关 **************/
message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginResp {
  UserInfo user = 1;
  string login_type = 2;
}

message LogoutReq {
  string user_id = 1; // 用户id
}

message LogoutResp {
  int64 logout_at = 2;
}

message LogoffReq {
  string user_id = 1; // 用户id
}

message LogoffResp {
  int64 logoff_at = 1;
}

message RegisterReq {
  string username = 1;
  string password = 2;
  string email = 3;
}

message RegisterResp {
  UserInfo user = 1;
}

message ResetPasswordReq {
  string email = 1;
  string user_id = 2;
  string password = 3;
}

message ResetPasswordResp {
  UserInfo user = 1;
}

message EmailLoginReq {
  string email = 1; // 邮箱
  string password = 2; // 密码
}

message PhoneLoginReq {
  string phone = 1; // 手机号
  string password = 2; // 密码
}

message ThirdLoginReq {
  string platform = 1;// 平台
  string open_id = 2;// 开放id
}

message GetUserInfoReq{
  string user_id = 1;
}

message GetUserInfoResp{
  UserInfo user = 1;
}

message GetUserOauthInfoReq{
  string user_id = 1;
}

message UpdateUserInfoReq {
  string nickname = 1;// 昵称
  UserInfo info = 2;// 用户信息
}

message UpdateUserInfoResp {
  UserInfo user = 1;
}

message UpdateUserAvatarReq {
  string avatar = 1; // 头像
}

message UpdateUserAvatarResp {
  UserInfo user = 1;
}

message UpdateUserPasswordReq {
  string user_id = 1;
  string old_password = 2; // 旧密码
  string new_password = 3; // 新密码
}

message UpdateUserPasswordResp {
  UserInfo user = 1;
}

message BindUserEmailReq {
  string email = 1; // 邮箱
}

message BindUserEmailResp {
  UserInfo user = 1;
}

message BindUserPhoneReq {
  string phone = 1; // 手机号
}

message BindUserPhoneResp {
  UserInfo user = 1;
}

message BindUserOauthReq {
  string platform = 1;// 平台
  string open_id = 2;// 开放id
  string nickname = 3;// 昵称
  string avatar = 4;// 头像
}

message BindUserOauthResp {
  UserInfo user = 1;
}

message UnbindUserOauthReq {
  string platform = 1;// 平台
  string nickname = 2;// 昵称
}

message UnbindUserOauthResp {
  UserInfo user = 1;
}

message GetUserOauthInfoResp {
  repeated UserOauthInfo list = 1;
}

message AdminUpdateUserStatusReq {
  // 意图：传递独立的变更请求列表，彻底消除长度不对齐与索引错乱风险。
  repeated UserStatusUpdate updates = 1;
}

message UserStatusUpdate {
  repeated string user_id = 1;
  UserStatus status = 2;
}

message AdminUpdateUserStatusResp {
  repeated UserInfo user = 1;
}

message FindUserListReq {
  PageReq paginate = 1;    // 分页参数
  string username = 2;
  string nickname = 3;
  string email = 4;
  string phone = 5;
  int64 status = 6;
  repeated string user_ids = 7;
}

message FindUserInfoListResp{
  PageResp pagination = 1; // 分页信息
  repeated UserInfo list = 2;
}

enum UserType {
  USER_TYPE_USER = 0;
  USER_TYPE_VISITOR = 1;
}

message AnalysisUserReq {
  UserType user_type = 1; // 用户类型 0用户 1游客
}

message AnalysisUserResp {
  int64 user_count = 1;
}

message AnalysisUserAreasReq {
  int64 user_type = 1;
}

message AnalysisUserAreasResp {
  repeated UserArea list = 1;
}


message FindVisitorListReq{
  PageReq paginate = 1;    // 分页参数
  string ip_source = 2;
}

message FindVisitorListResp{
  PageResp pagination = 1; // 分页信息
  repeated VisitorInfo list = 2;
}


service AccountRpc {
  // 登录
  rpc Login(LoginReq) returns(LoginResp);
  // 登出
  rpc Logout(LogoutReq) returns(LogoutResp);
  // 注销
  rpc Logoff(LogoffReq) returns(LogoffResp);

  // 注册
  rpc Register(RegisterReq) returns(RegisterResp);
  // 重置密码
  rpc ResetPassword(ResetPasswordReq) returns(ResetPasswordResp);

  // 邮箱登录
  rpc EmailLogin(EmailLoginReq) returns(LoginResp);
  // 手机号登录
  rpc PhoneLogin(PhoneLoginReq) returns(LoginResp);
  // 第三方登录
  rpc ThirdLogin(ThirdLoginReq) returns(LoginResp);


  // 获取用户信息
  rpc GetUserInfo(GetUserInfoReq) returns(GetUserInfoResp);
  // 获取用户第三平台信息
  rpc GetUserOauthInfo(GetUserOauthInfoReq) returns(GetUserOauthInfoResp);
  // 修改用户信息
  rpc UpdateUserInfo(UpdateUserInfoReq) returns(UpdateUserInfoResp);
  // 修改用户头像
  rpc UpdateUserAvatar(UpdateUserAvatarReq) returns(UpdateUserAvatarResp);
  // 修改用户密码
  rpc UpdateUserPassword(UpdateUserPasswordReq) returns(UpdateUserPasswordResp);

  // 修改用户登录邮箱
  rpc BindUserEmail(BindUserEmailReq) returns(BindUserEmailResp);
  // 修改用户登录手机号
  rpc BindUserPhone(BindUserPhoneReq) returns(BindUserPhoneResp);
  // 修改用户第三方账号
  rpc BindUserOauth(BindUserOauthReq) returns(BindUserOauthResp);
  // 解绑第三方账号
  rpc UnbindUserOauth(UnbindUserOauthReq) returns(UnbindUserOauthResp);


  // 修改用户状态
  rpc AdminUpdateUserStatus(AdminUpdateUserStatusReq) returns(AdminUpdateUserStatusResp);

  // 查找用户信息列表
  rpc FindUserInfoList(FindUserListReq) returns(FindUserInfoListResp);
  // 查找在线用户列表
  rpc FindUserOnlineList(FindUserListReq) returns(FindUserInfoListResp);

  // 查询用户数量
  rpc AnalysisUser(AnalysisUserReq) returns(AnalysisUserResp);
  // 查询用户分布区域
  rpc AnalysisUserAreas(AnalysisUserAreasReq) returns(AnalysisUserAreasResp);

  // 查询游客信息
  rpc FindVisitorList(FindVisitorListReq) returns(FindVisitorListResp);
}
