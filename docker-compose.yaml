services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./blog-init.sql:/docker-entrypoint-initdb.d/01-blog-init.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"

  rabbitmq:
    image: rabbitmq:4.1.3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"

  blog-rpc:
    build:
      context: .
      dockerfile: docker/blog-rpc/Dockerfile
    depends_on:
      - postgres
      - redis
      - rabbitmq
    env_file:
      - .env
    ports:
      - "${BLOG_RPC_PORT}:${BLOG_RPC_PORT}"

  admin-api:
    build:
      context: .
      dockerfile: docker/admin-api/Dockerfile
    depends_on:
      - blog-rpc
      - redis
    env_file:
      - .env
    ports:
      - "${ADMIN_API_PORT}:${ADMIN_API_PORT}"
      - "${ADMIN_API_DEVSERVER_PORT}:${ADMIN_API_DEVSERVER_PORT}"
    volumes:
      - admin-runtime:/app/runtime

volumes:
  postgres-data:
  admin-runtime:
